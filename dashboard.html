<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YourValueMatch | Algorithm Configurator</title>
    <style>
        :root {
            --bg-canvas: #faf9f6; --card-surface: #ffffff;
            --electric-lilac: linear-gradient(135deg, #c084fc 0%, #818cf8 100%);
            --match-high: linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
        }
        body { margin: 0; padding: 0; font-family: -apple-system, sans-serif; background: var(--bg-canvas); display: flex; justify-content: center; min-height: 100vh; align-items: center; }
        .app-layout { display: flex; width: 100%; max-width: 1000px; background: #ffffff; border-radius: 28px; box-shadow: 0 20px 50px rgba(0,0,0,0.02); min-height: 70vh; border: 1px solid rgba(129, 140, 248, 0.1); overflow: hidden; }
        .panel-main { flex: 1.2; padding: 48px; box-sizing: border-box; }
        .panel-side { flex: 0.8; background: #fdfdfc; padding: 48px; box-sizing: border-box; border-left: 1px solid #f1f5f9; display: flex; flex-direction: column; justify-content: space-between; }
        .logo-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
        .logo { font-size: 22px; font-weight: 800; background: var(--electric-lilac); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
        .home-nav { font-size: 13px; font-weight: 600; color: #64748b; text-decoration: none; }
        .score-box { width: 100px; height: 100px; border-radius: 50%; background: var(--match-high); display: flex; align-items: center; justify-content: center; color: white; font-size: 28px; font-weight: 800; margin: 24px auto; }
        .slider-wrap { margin-bottom: 24px; }
        .slider-meta { display: flex; justify-content: space-between; font-weight: 600; font-size: 14px; margin-bottom: 8px; }
        .slider-input { width: 100%; height: 6px; background: #f1f5f9; border-radius: 10px; -webkit-appearance: none; outline: none; }
        .slider-input::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%; background: white; border: 4px solid #818cf8; cursor: pointer; }
        .btn-lock { width: 100%; background: var(--electric-lilac); color: white; padding: 16px; border-radius: 12px; font-weight: 700; border: none; font-size: 16px; cursor: pointer; }
        @media (max-width: 768px) { .app-layout { flex-direction: column; } .panel-side { border-left: none; border-top: 1px solid #f1f5f9; } }
    </style>
</head>
<body>

<div class="app-layout">
    <div class="panel-main">
        <div class="logo-bar">
            <a href="index.html" class="logo">YourValueMatch</a>
            <a href="index.html" class="home-nav">← Exit to Home</a>
        </div>
        <h3 style="margin: 0 0 28px 0; letter-spacing: -0.5px;">Tweak Vector Attributes</h3>
        
        <div class="slider-wrap">
            <div class="slider-meta"><span>🌿 Value Factor Alpha</span><span id="v1">50%</span></div>
            <input type="range" class="slider-input" id="t1" value="50">
        </div>
        <div class="slider-wrap">
            <div class="slider-meta"><span>🤝 Value Factor Beta</span><span id="v2">50%</span></div>
            <input type="range" class="slider-input" id="t2" value="50">
        </div>
        <div class="slider-wrap">
            <div class="slider-meta"><span>🌍 Value Factor Gamma</span><span id="v3">50%</span></div>
            <input type="range" class="slider-input" id="t3" value="50">
        </div>
        <div class="slider-wrap">
            <div class="slider-meta"><span>📈 Value Factor Delta</span><span id="v4">50%</span></div>
            <input type="range" class="slider-input" id="t4" value="50">
        </div>
    </div>

    <div class="panel-side">
        <div style="text-align: center;">
            <div style="font-size: 12px; text-transform: uppercase; color: #94a3b8; font-weight: 700;">Account Profile Sync</div>
            <div id="userBadge" style="font-weight: 700; margin-top: 6px; font-size: 16px; color: #4f46e5;">@Guest</div>
            <div class="score-box" id="avgDisp">50%</div>
            <p style="font-size: 13px; color: #64748b; line-height: 1.4;">Sliders move independently. Gemini balances ratios dynamically during evaluation loops.</p>
        </div>
        <button class="btn-lock" id="saveMatrix">Lock Vector Parameters</button>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const user = localStorage.getItem('vm_user') || 'Guest';
        document.getElementById('userBadge').textContent = `@${user}`;

        const inputs = [document.getElementById('t1'), document.getElementById('t2'), document.getElementById('t3'), document.getElementById('t4')];
        const outputs = [document.getElementById('v1'), document.getElementById('v2'), document.getElementById('v3'), document.getElementById('v4')];
        const avgDisp = document.getElementById('avgDisp');

        function update() {
            let total = 0;
            inputs.forEach((input, i) => {
                outputs[i].textContent = `${input.value}%`;
                total += parseInt(input.value);
            });
            avgDisp.textContent = `${Math.round(total / 4)}%`;
        }

        inputs.forEach(input => input.addEventListener('input', update));
        document.getElementById('saveMatrix').addEventListener('click', () => {
            localStorage.setItem('vm_payload', JSON.stringify({ t1: inputs[0].value, t2: inputs[1].value, t3: inputs[2].value, t4: inputs[3].value }));
            window.location.href = 'compare.html';
        });
    });
</script>
</body>
</html>
