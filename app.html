<script>
    // =========================================================================
    // ValueMatch™ Production Frontend Integration Engine
    // =========================================================================
    const BACKEND_URL = 'https://yourvaluematch-backend.onrender.com';
    
    // User Context Configuration
    const userEmail = localStorage.getItem('userEmail') || 'shopper@yourvaluematch.com';

    // State Elements
    const directoryGrid = document.getElementById('directoryGrid');
    const searchInput = document.getElementById('productSearchInput');
    const matchResultsContainer = document.getElementById('matchResults');

    // 1. DYNAMIC FEED: Load Live Products from Render PostgreSQL Database
    async function loadLiveDirectory() {
        try {
            if (!directoryGrid) return;
            directoryGrid.innerHTML = '<div class="loading">Loading your live values database...</div>';
            
            const response = await fetch(`${BACKEND_URL}/api/products`);
            const data = await response.json();

            if (!data.success || data.products.length === 0) {
                directoryGrid.innerHTML = '<div class="empty">No active items in the directory. Waiting for seed/sync.</div>';
                return;
            }

            directoryGrid.innerHTML = ''; // Clear loading state
            
            data.products.forEach(product => {
                const productCard = document.createElement('div');
                productCard.className = 'product-card';
                productCard.innerHTML = `
                    <img src="${product.image_url}" alt="${product.name}" class="product-img">
                    <div class="product-details">
                        <span class="brand-tag">${product.brand_name}</span>
                        <h3>${product.name}</h3>
                        <p class="category-tag">${product.category}</p>
                        <div class="values-badges">
                            ${product.cruelty_free_score ? '<span class="badge cf">🐰 Cruelty-Free</span>' : ''}
                            ${product.clean_ingredients_score ? '<span class="badge ci">🌿 Clean Ingredients</span>' : ''}
                            ${product.low_waste_score ? '<span class="badge lw">♻️ Low Waste</span>' : ''}
                        </div>
                        <div class="purchase-row">
                            <span class="price">$${parseFloat(product.price).toFixed(2)}</span>
                            <a href="${product.original_url}" target="_blank" class="buy-btn">Shop via ${product.merchant_name}</a>
                        </div>
                    </div>
                `;
                directoryGrid.appendChild(productCard);
            });
        } catch (error) {
            console.error("❌ Directory Retrieval Failure:", error);
            if (directoryGrid) {
                directoryGrid.innerHTML = '<div class="error">Failed to stream live product taxonomy map.</div>';
            }
        }
    }

    // 2. AI MATCH ENGINE: Wire Search String & Weights to Live Proxy Router
    async function executeAIMatch(event) {
        if (event) event.preventDefault();
        
        const query = searchInput ? searchInput.value.trim() : '';
        if (!query) return;

        try {
            if (matchResultsContainer) {
                matchResultsContainer.innerHTML = '<div class="loading">AI Agents analyzing brand value alignments...</div>';
            }

            // Gather values slider or checkbox weights from the user interface
            const weights = {
                crueltyFree: document.getElementById('weightCF')?.checked ? 1 : 0,
                cleanIngredients: document.getElementById('weightCI')?.checked ? 1 : 0,
                lowWaste: document.getElementById('weightLW')?.checked ? 1 : 0
            };

            const response = await fetch(`${BACKEND_URL}/api/analyze`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    product: query,
                    weights: weights,
                    userEmail: userEmail
                })
            });

            const data = await response.json();

            if (!data.success || !data.recommendations) {
                throw new Error("Invalid analytics object mapping structure received.");
            }

            matchResultsContainer.innerHTML = ''; // Clear loader
            
            data.recommendations.forEach(rec => {
                const recCard = document.createElement('div');
                recCard.className = 'rec-cardCard';
                recCard.innerHTML = `
                    <div class="rec-header">
                        <h4>${rec.brand}</h4>
                        <span class="match-badge">${rec.matchScore}% Match</span>
                    </div>
                    <h5>Alternative: ${rec.product}</h5>
                    <p>${rec.reason}</p>
                    <a href="${rec.monetizationRedirectUrl}" target="_blank" class="monetized-btn">View Value Match</a>
                `;
                matchResultsContainer.appendChild(recCard);
            });

        } catch (error) {
            console.error("❌ AI Optimization Routing Failure:", error);
            if (matchResultsContainer) {
                matchResultsContainer.innerHTML = '<div class="error">AI Match Engine encountered a processing timeout.</div>';
            }
        }
    }

    // 3. CLEAN FILE ROUTING: Session Handshake & Direct Redirection Rules
    function verifyStateHandoffs() {
        const path = window.location.pathname;
        
        // Ensure user state persistency across HTML splits without breaking engine flows
        if (path.includes('app') && !localStorage.getItem('userAuthenticated')) {
            console.log("⚠️ Session invalid. Routing user to sign up step.");
            window.location.href = './signup.html';
        }
    }

    // Initialize Page Pipelines and Enforce Security Safeguard
    document.addEventListener('DOMContentLoaded', () => {
        const isVerified = localStorage.getItem('userAuthenticated') === 'true';
        
        if (!isVerified) {
            console.warn("⚠️ Absolute Safeguard Triggered: Session missing token. Routing to onboarding.");
            window.location.href = 'signup.html';
            return; // Terminate execution loop immediately
        }

        // Token verified -> safely stream live data layer
        loadLiveDirectory();

        const searchButton = document.getElementById('searchSubmitBtn');
        if (searchButton) {
            searchButton.addEventListener('click', executeAIMatch);
        }
    });
</script>
