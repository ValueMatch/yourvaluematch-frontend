<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YourValueMatch | Establish Baseline Profile</title>
    <style>
        body { margin: 0; padding: 0; font-family: -apple-system, sans-serif; background: #faf9f6; display: flex; justify-content: center; min-height: 100vh; align-items: center; }
        .form-shell { width: 100%; max-width: 440px; background: #ffffff; padding: 40px 28px; box-sizing: border-box; border-radius: 24px; border: 1px solid rgba(129, 140, 248, 0.12); box-shadow: 0 15px 40px rgba(0,0,0,0.02); }
        .logo-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
        .logo { font-size: 22px; font-weight: 800; background: linear-gradient(135deg, #c084fc 0%, #818cf8 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
        .home-link { font-size: 13px; font-weight: 600; color: #64748b; text-decoration: none; border: 1px solid #e2e8f0; padding: 6px 14px; border-radius: 20px; }
        .input-box { width: 100%; padding: 14px; border: 1px solid #cbd5e1; border-radius: 10px; font-size: 15px; box-sizing: border-box; margin-bottom: 24px; }
        .submit-btn { width: 100%; background: linear-gradient(135deg, #c084fc 0%, #818cf8 100%); color: white; padding: 16px; border-radius: 12px; font-weight: 700; border: none; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>

<div class="form-shell">
    <div class="logo-nav">
        <a href="index.html" class="logo">YourValueMatch</a>
        <a href="index.html" class="home-link">← Home</a>
    </div>
    
    <h2 style="margin: 0 0 8px 0; font-size: 22px; letter-spacing: -0.5px;">Setup Baseline Account</h2>
    <p style="font-size: 14px; color: #64748b; margin: 0 0 24px 0;">Establish your tracking profile to access the alignment configurator dashboard.</p>

    <form id="profileForm">
        <label style="display:block; font-weight:600; font-size:14px; margin-bottom:8px;">Profile Username Handle</label>
        <input type="text" id="username" class="input-box" placeholder="@username" required>
        
        <button type="submit" class="submit-btn">Continue to Custom Matrix</button>
    </form>
</div>

<script>
    document.getElementById('profileForm').addEventListener('submit', (e) => {
        e.preventDefault();
        localStorage.setItem('vm_user', document.getElementById('username').value);
        window.location.href = 'dashboard.html';
    });
</script>
</body>
</html>
