<script>
    document.addEventListener('DOMContentLoaded', () => {
        const row1 = document.getElementById('vector1');
        const row2 = document.getElementById('vector2');
        const rad1 = document.getElementById('rad1');
        const rad2 = document.getElementById('rad2');
        const submitSetupBtn = document.getElementById('submitSetupBtn');

        // 1. Safe Visual Toggle Engine
        if (row1 && row2 && rad1 && rad2) {
            row1.addEventListener('click', () => { 
                row1.classList.add('active'); 
                row2.classList.remove('active'); 
                rad1.checked = true; 
            });
            row2.addEventListener('click', () => { 
                row2.classList.add('active'); 
                row1.classList.remove('active'); 
                rad2.checked = true; 
            });
        }

        // 2. Data Pipeline Execution
        if (submitSetupBtn) {
            submitSetupBtn.addEventListener('click', () => {
                const emailField = document.getElementById('userEmailField');
                if (!emailField) return;

                const emailvalue = emailField.value.trim();
                if(!emailvalue || !emailvalue.includes('@')) {
                    return alert('Please input a valid identity email address.');
                }

                // Maps directly to the keys expected inside your app.html filtering loops
                const selectedPillar = (rad1 && rad1.checked) ? 'clean_ingredients' : 'cruelty_free';

                try {
                    localStorage.setItem('vm_active_user_email', emailvalue);
                    localStorage.setItem('vm_initial_pillar', selectedPillar);
                    localStorage.setItem('userAuthenticated', 'true');
                } catch(e) {
                    console.warn("Storage write blocked by browser context rules.");
                }

                // Redirect cleanly to your application board
                window.location.href = 'app.html';
            });
        }
    });
</script>
