<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YourValueMatch - Configure Profile</title>
    <style>
        :root {
            --bg-canvas: #faf9f6;
            --card-surface: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --electric-lilac: #818cf8;
            --electric-lilac-gradient: linear-gradient(135deg, #c084fc 0%, #818cf8 100%);
            --border-ui: rgba(129, 140, 248, 0.15);
        }

        body {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
            background-color: var(--bg-canvas);
            color: var(--text-primary);
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        .app-container {
            width: 100%; max-width: 1200px; padding: 32px 24px; box-sizing: border-box;
            display: flex; flex-direction: column; gap: 24px; align-items: center;
        }

        header {
            width: 100%; display: flex; justify-content: space-between; align-items: center;
            padding-bottom: 16px; border-bottom: 1px solid var(--border-ui);
        }

        .logo {
            font-size: 24px; font-weight: 800;
            background: var(--electric-lilac-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: -1px; text-decoration: none;
        }

        .setup-card {
            background: var(--card-surface); border: 1px solid var(--border-ui); border-radius: 24px;
            padding: 32px; width: 100%; max-width: 520px; box-shadow: 0 10px 30px rgba(0,0,0,0.02);
            display: flex; flex-direction: column; gap: 24px; margin-top: 20px;
        }

        .setup-card h2 { font-size: 22px; font-weight: 800; margin: 0; text-align: center; letter-spacing: -0.5px; }
        
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-group label { font-size: 13px; font-weight: 800; color: var(--text-primary); text-transform: uppercase; letter-spacing: 0.5px; }
        
        .input-text { 
            width: 100%; padding: 14px 16px; border: 1px solid #cbd5e1; border-radius: 12px; 
            font-size: 14px; box-sizing: border-box; outline: none; transition: border-color 0.2s; 
        }
        .input-text:focus { border-color: var(--electric-lilac); }

        .pillar-select-list { display: flex; flex-direction: column; gap: 12px; }
        
        .pillar-row {
            border: 1px solid #e2e8f0; border-radius: 14px; padding: 16px; display: flex; gap: 14px; 
            align-items: flex-start; cursor: pointer; transition: all 0.2s; background: #fff;
        }
        .pillar-row:hover { border-color: #cbd5e1; }
        
        /* Active State Styling */
        .pillar-row.active { 
            border-color: var(--electric-lilac); 
            background: rgba(129, 140, 248, 0.03); 
            box-shadow: 0 0 0 1px var(--electric-lilac); 
        }
        
        .pillar-row input[type="radio"] { margin-top: 4px; cursor: pointer; accent-color: var(--electric-lilac); }
        .pillar-meta strong { display: flex; align-items: center; gap: 8px; font-size: 15px; margin-bottom: 4px; color: #0f172a; }
        .pillar-meta p { margin: 0; font-size: 13px; color: var(--text-secondary); line-height: 1.5; }
        
        .signup-actions { display: flex; gap: 12px; margin-top: 12px; width: 100%; }
        
        .action-btn { 
            background: var(--electric-lilac-gradient); color: white; border: none; padding: 16px; 
            border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer; 
            box-shadow: 0 4px 12px rgba(129, 140, 248, 0.2); flex: 1; transition: opacity 0.2s;
        }
        .action-btn:hover { opacity: 0.95; }
        
        .guest-btn { 
            background: transparent; color: var(--electric-lilac); border: 1px solid var(--electric-lilac); 
            padding: 16px; border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer; 
            flex: 1; transition: background 0.2s;
        }
        .guest-btn:hover { background: rgba(129, 140, 248, 0.05); }

    </style>
</head>
<body>

<div class="app-container">
    <header>
        <a href="index.html" class="logo">YourValueMatch</a>
    </header>

    <main class="setup-card">
        <h2>Configure Your Value Profile</h2>
        
        <div class="form-group">
            <label for="userEmailField">Account Email</label>
            <input type="email" id="userEmailField" class="input-text" placeholder="Enter your email to anchor your preferences" required autocomplete="email">
        </div>

        <div class="form-group" style="margin-top: 8px;">
            <label>Select Top Baseline Focus Pillar</label>
            <div id="templateContainer" class="pillar-select-list">
                </div>
        </div>
        
        <div class="signup-actions">
            <button type="button" id="continueGuestBtn" class="guest-btn">Continue as Guest</button>
            <button type="button" id="submitSetupBtn" class="action-btn">Create Value Profile</button>
        </div>
    </main>
</div>

<script>
    // 12-Point Scoring Key:
    // [Clean, Organic, CrueltyFree, Vegan, ZeroWaste, Climate, Labor, Transparency, Indie, Inclusion, Local, Regenerative]
    
    const valueTemplates = [
        {
            id: "clean",
            icon: "🍃",
            title: "Clean Composition",
            desc: "Prioritizes toxin-free products, clean elements, and full label safety verification.",
            scores: [100, 100, 50, 50, 50, 50, 50, 90, 80, 50, 50, 50]
        },
        {
            id: "labor",
            icon: "🤝",
            title: "Ethical Labour",
            desc: "Prioritizes human rights, fair wages, safety oversight, and manufacturing integrity.",
            scores: [50, 50, 80, 50, 50, 50, 100, 100, 100, 100, 50, 50]
        },
        {
            id: "planet",
            icon: "🌍",
            title: "Planet First",
            desc: "Prioritizes climate action, zero-waste packaging, and regenerative agricultural practices.",
            scores: [50, 70, 70, 60, 100, 100, 70, 60, 50, 50, 80, 100]
        },
        {
            id: "animal",
            icon: "🐰",
            title: "Animal Advocate",
            desc: "Prioritizes cruelty-free testing, 100% vegan formulations, and strict animal welfare.",
            scores: [50, 50, 100, 100, 70, 80, 50, 60, 50, 50, 50, 50]
        }
    ];

    let activeTemplateId = valueTemplates[0].id;
    const container = document.getElementById('templateContainer');

    // Render the interactive list
    function renderTemplates() {
        container.innerHTML = '';
        valueTemplates.forEach(template => {
            const isActive = template.id === activeTemplateId;
            
            const div = document.createElement('div');
            div.className = `pillar-row ${isActive ? 'active' : ''}`;
            
            div.innerHTML = `
                <input type="radio" name="pillar_selection" ${isActive ? 'checked' : ''} style="pointer-events: none;">
                <div class="pillar-meta">
                    <strong>${template.icon} ${template.title}</strong>
                    <p>${template.desc}</p>
                </div>
            `;
            
            div.onclick = () => {
                activeTemplateId = template.id;
                renderTemplates(); // Re-render to update classes and radio buttons
            };
            
            container.appendChild(div);
        });
    }

    renderTemplates(); // Initial render

    // --- BUTTON ROUTING LOGIC --- //

    // 1. Guest Routing
    document.getElementById('continueGuestBtn').addEventListener('click', () => {
        localStorage.removeItem('savedEmail'); 
        window.location.href = 'app.html';
    });

    // 2. Create Profile Routing
    document.getElementById('submitSetupBtn').addEventListener('click', (e) => {
        e.preventDefault();
        const userEmail = document.getElementById('userEmailField').value.trim();
        
        if (!userEmail || !userEmail.includes('@')) {
            alert("Please enter a valid email address to anchor your profile.");
            return;
        }

        // Find the active template's scores array
        const selectedData = valueTemplates.find(t => t.id === activeTemplateId);

        // Save identity and backend payload scores to local storage
        localStorage.setItem('savedEmail', userEmail);
        localStorage.setItem('userProfileScores', JSON.stringify(selectedData.scores));
        
        console.log("Profile created. 12-Point Data mapped for:", userEmail);
        window.location.href = 'app.html'; 
    });
</script>
</body>
</html>
