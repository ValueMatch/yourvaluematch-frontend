<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YourValueMatch - Configuration</title>
    <style>
        :root {
            --bg-canvas: #faf9f6; --card-surface: #ffffff;
            --text-primary: #0f172a; --text-secondary: #64748b;
            --electric-lilac: linear-gradient(135deg, #c084fc 0%, #818cf8 100%);
            --border-ui: rgba(129, 140, 248, 0.15);
        }
        body { margin: 0; font-family: -apple-system, sans-serif; background-color: var(--bg-canvas); display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 1200px; padding: 32px 24px; box-sizing: border-box; }
        .logo { font-size: 24px; font-weight: 800; background: var(--electric-lilac); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
        .setup-card { background: var(--card-surface); border: 1px solid var(--border-ui); border-radius: 24px; padding: 32px; width: 100%; max-width: 480px; box-shadow: 0 10px 30px rgba(0,0,0,0.02); margin: 40px auto; }
        .form-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
        .input-text { width: 100%; padding: 14px; border: 1px solid #cbd5e1; border-radius: 12px; box-sizing: border-box; }
        .pillar-select-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }
        .pillar-row { border: 1px solid #e2e8f0; border-radius: 14px; padding: 14px; cursor: pointer; display: flex; gap: 12px; }
        .pillar-row.active { border-color: #818cf8; background: rgba(129, 140, 248, 0.03); }
        .action-btn { background: var(--electric-lilac); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: 700; cursor: pointer; flex: 1; }
        .signup-actions { display: flex; gap: 12px; }
    </style>
</head>
<body>

<div class="app-container">
    <header><a href="signup.html" class="logo">YourValueMatch</a></header>

    <main class="setup-card">
        <h2>Configure Your Value Profile</h2>
        <div class="form-group">
            <label>Account Email</label>
            <input type="email" id="userEmailField" class="input-text" placeholder="Enter email to anchor preferences">
        </div>

        <label>Select Top Baseline Focus Pillar</label>
        <div class="pillar-select-list">
            <div class="pillar-row active" onclick="selectPillar('clean', this)">
                <input type="radio" name="pillar" value="clean" checked>
                <div><strong>🍃 Clean Composition</strong><p style="font-size: 12px;">Prioritizes toxin-free products.</p></div>
            </div>
            <div class="pillar-row" onclick="selectPillar('labor', this)">
                <input type="radio" name="pillar" value="labor">
                <div><strong>🐰 Ethical Labor Tracking</strong><p style="font-size: 12px;">Prioritizes human rights.</p></div>
            </div>
        </div>

        <div class="signup-actions">
            <button type="button" id="continueGuestBtn" class="action-btn" style="background: transparent; border: 1px solid #818cf8; color: #818cf8;">Continue as Guest</button>
            <button type="button" id="submitSetupBtn" class="action-btn">Create Value Profile</button>
        </div>
    </main>
</div>

<script>
    // Logic for Pillar Selection
    function selectPillar(val, el) {
        document.querySelectorAll('.pillar-row').forEach(r => r.classList.remove('active'));
        el.classList.add('active');
        el.querySelector('input').checked = true;
    }

    // Guest Mode
    document.getElementById('continueGuestBtn').addEventListener('click', () => {
        localStorage.removeItem('userEmail');
        window.location.href = 'app.html';
    });

    // Create Profile Mode
    document.getElementById('submitSetupBtn').addEventListener('click', () => {
        const email = document.getElementById('userEmailField').value;
        const pillar = document.querySelector('input[name="pillar"]:checked').value;
        
        if (!email.includes('@')) return alert("Enter a valid email.");
        
        localStorage.setItem('userEmail', email);
        localStorage.setItem('vm_initial_pillar', pillar);
        window.location.href = 'app.html';
    });
</script>
</body>
</html>
